name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  ACR_NAME: <your-acr-name>
  IMAGE_NAME: todo-frontend
  WEBAPP_NAME: <your-webapp-name>

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Build Docker Image
      run: docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .

    - name: Push to ACR
      run: docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

    - name: Deploy to Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.WEBAPP_NAME }}
        images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest